# Standalone docker-compose for user-profile-service development.
# For infrastructure (postgres, redis, rabbitmq) use /infrastructure/docker-compose.yml.
# Both compose files share the same external network "ssz_network".

services:
  user-profile-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder   # Use the builder stage for hot-reload in dev
    container_name: ssz-user-profile-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      # Mount source code for hot-reload during development
      - ./src:/app/src
      - ./prisma:/app/prisma
    command: npm run start:dev
    networks:
      - ssz_network
    depends_on:
      - profiles_db

  profiles_db:
    image: postgres:16-alpine
    container_name: ssz-profiles-db
    environment:
      POSTGRES_USER: profile_service
      POSTGRES_PASSWORD: profile_service_password
      POSTGRES_DB: profiles_db
    ports:
      - "5433:5432"   # Offset port to avoid conflict with main postgres on 5432
    volumes:
      - profiles_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profile_service -d profiles_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssz_network

networks:
  ssz_network:
    external: true   # Shared with the infrastructure compose

volumes:
  profiles_db_data:
