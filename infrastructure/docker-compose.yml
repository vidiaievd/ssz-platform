services:

  postgres:
    image: postgres:16-alpine
    container_name: ssz-postgres
    environment:
      POSTGRES_USER: ssz_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssz_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ssz-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-localdevpassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-localdevpassword}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ssz-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ssz_admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-localdevpassword}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ssz-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ssz.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: