worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Shared upstream definitions
    upstream auth_service      { server auth-service:5000; }
    upstream profile_service   { server user-profile-service:3001; }
    upstream org_service       { server organization-service:3002; }
    upstream content_service   { server content-service:3003; }
    upstream media_service     { server media-service:3004; }

    # Rate limiting zones (backed by shared memory)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;

    server {
        listen 80;
        server_name _;

        # Global headers forwarded to every upstream
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-ID  $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # ── Auth Service ──────────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass http://auth_service;
        }

        # ── User Profile Service ──────────────────────────────────────────────
        location /api/v1/profiles/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://profile_service;
        }

        # ── Organization Service ──────────────────────────────────────────────
        location /api/v1/organizations/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://org_service;
        }

        # ── Content Service ───────────────────────────────────────────────────
        location /api/v1/content/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://content_service;
        }

        # ── Media Service ─────────────────────────────────────────────────────
        location /api/v1/media/ {
            limit_req zone=api_limit burst=20 nodelay;
            # Allow large uploads (overridden per-location)
            client_max_body_size 512m;
            proxy_pass http://media_service;
        }

        # ── Health aggregation ────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
